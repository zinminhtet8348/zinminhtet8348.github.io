<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- css file -->
    <link rel="stylesheet" href="register.css" />
  </head>
  <body>
    <h1>Register Form</h1>
    <form action="#" method="get" id="myForm">
      <div>
        <label for="name">Name</label> <br />
        <input type="text" id="name" name="name" />
      </div>
      <br />

      <div>
        <label for="email">Email</label> <br />
        <input type="email" id="email" name="email" />
      </div>
      <br />

      <div>
        <label for="phone">Phone</label> <br />
        <input type="number" id="phone" name="phone" />
      </div>
      <br />

      <div>
        <label for="Gender">Gender</label> <br />

        <input type="radio" id="male" name="gender" value="male" />
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female" />
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other" />
        <label for="other">Other</label>
      </div>
      <br />

      <div>
        <label for="hobby">Hobbies</label> <br />

        <div>
          <input type="checkbox" id="reading" name="hobby" value="reading" />
          <label for="reading">Reading</label>
        </div>
        <div>
          <input
            type="checkbox"
            id="sport"
            name="hobby"
            value="sport"
            disabled
          />
          <label for="sport">Sport</label>
        </div>
        <div>
          <input type="checkbox" id="music" name="hobby" value="music" />
          <label for="music">Music</label>
        </div>
        <div>
          <input type="checkbox" id="movie" name="hobby" value="movie" />
          <label for="movie">Movie</label>
        </div>
        <div>
          <input type="checkbox" id="game" name="hobby" value="game" />
          <label for="game">Game</label>
        </div>
      </div>
      <br />

      <fieldset>
        <legend>Rules</legend>

        <ul>
          <li>This is the first rule</li>
          <li>This is the second rule</li>
          <li>This is the third rule</li>
          <li>This is the fourth rule</li>
          <li>This is the fifth rule</li>
          <li>This is the sixth rule</li>
          <li>This is the seventh rule</li>
        </ul>
      </fieldset>

      <p></p>
      <p>Thank you for registering</p>
      <p></p>

      <button type="submit" class="register_btn">Submit</button>
    </form>
  </body>
</html>
