<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Operator</h1>

    <script>

      //assign =
      let name = "Zin Wai Thin";
      console.log(name);

      //additional +
      let number = 4 + 5;
      console.log(number);
      let fourFive = '4' + 5;
      console.log(fourFive);

      let num = 10;
      num += 5;
      console.log(num);

      //multiplication *
      let num4 = 581258;
      num4 = num4 * 452;
      console.log(num4);

      //division /
      let num5 = 10;
      num5 = num5 / 2;
      console.log(num5);

      //remainder %
      let num6 = 475863;
      num6 = num6 % 4852;
      console.log(num6);

      //exponent
      const num7 = 2;
      const num8 =6;
      const num9 = num7  num8;
      console.log(num9);

      //presendence
      let result = (4+5)-2 *5 /2 %3;
      console.log(result);
    </script>
  </body>
</html>
