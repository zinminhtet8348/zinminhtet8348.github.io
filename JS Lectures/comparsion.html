<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <h1>Comparsion</h1>

    <script>
      //greater than operator >

      let num1 = 10;
      let num2 = 20;

      console.log(num1 > num2);
      console.log(num1 >= num2);

      //less than operator <

      console.log(num1 < num2);
      console.log(num1 <= num2);

      //equal to operator == value
      console.log(num1 == num2);

      //equal to operator === data type, value

      console.log(num1 == num2);

      //not equal  != value
      console.log(num1 != num2);

      //not equal  !== data type, value
      console.log(num1 !== num2);
    </script>
  </body>
</html>
