<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <h1>Student Registeration</h1>
    <form action="request.php" method="get">
      <label for="name">Name</label>
      <input type="text" name="stu_name" id="name" />
      <br /><br />
      <label for="email">Email</label>
      <input type="email" name="stu_email" id="email" />
      <br /><br />
      <label for="phone">Phone</label>
      <input type="number" name="stu_phone" id="phone" />
      <br /><br />
      <label for="password">Password</label>
      <input type="password" name="stu_password" id="password" />
      <br /><br />
      <label for="dob">Date of Birth</label>
      <input type="date" name="stu_dob" id="dob" />
      <br /><br />
      <label for="passport">Passport</label>
      <input type="file" accept=".png,.pdf" name="stu_passport" id="passport" />
      <br /><br />
      <label for="year">Years</label>
      <select name="stu_year" id="year">
        <option value="">Choose your year</option>
        <option value="1">First Year</option>
        <option value="2">Second Year</option>
        <option value="3">Third Year</option>
      </select>
      <br /><br />
      <label for="">Gender</label>
      <br /><br />
      <input type="radio" name="gender" id="male" value="male" /><label
        for="male"
        >Male</label
      >
      <input type="radio" name="gender" id="female" value="female" /><label
        for="female"
        >Female</label
      >
      <input type="radio" name="gender" id="other" value="other" /><label
        for="other"
        >Other</label
      >
      <br /><br />
      <label for="">Hobby</label>
      <br />
      <input type="checkbox" name="gaming" id="gaming" />
      <label for="gaming">Gaming</label>
      <input type="checkbox" name="reading" id="reading" />
      <label for="reading">Reading</label>
      <input type="checkbox" name="swimming" id="swimming" />
      <label for="swimming">Swimming</label> <br /><br />
      <label for="address">Address</label>
      <textarea name="stu_address" id="address" cols="50" rows="15"></textarea>
      <br /><br />
      <input type="time" name="" id="" />
      <input type="range" min="0" max="100" />
      <input type="color" name="" id="" />
      <input type="text" name="" id="" required />
      <input type="text" name="city1" id="" value="Mandalay" />
      <input type="text" name="city2" id="" value="Yangon" readonly />
      <input type="text" name="place" id="" placeholder="eg.09xxxxxxxxx" />
      <br /><br />
      <button type="sumit">Submit</button>
    </form>
  </body>
</html>
