<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table2</title>
  </head>
  <body>
    <p><a href="./table3.html">Open Table 3 (merged-cells layout)</a></p>
    <h1>Invoice</h1>
    <table border="1" cellspacing="0" cellpadding="30">
      <thead>
        <tr>
          <th>No.</th>
          <th>Item Name</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Signal</td>
          <td>9000</td>
          <td>1</td>
          <td>9000</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Bubble</td>
          <td>12500</td>
          <td>1</td>
          <td>12500</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Egg</td>
          <td>500</td>
          <td>10</td>
          <td>5000</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th colspan="4">Total</th>
          <th>33500</th>
        </tr>
      </tfoot>
    </table>

    <h1>Saving Money</h1>
    <table border="1" cellspacing="0" cellpadding="30">
      <thead>
        <tr>
          <th>Months</th>
          <th>Save Money</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>January</td>
          <td>100000</td>
          <td rowspan="4">400000</td>
        </tr>
        <tr>
          <td>February</td>
          <td>50000</td>
        </tr>
        <tr>
          <td>March</td>
          <td>10000</td>
        </tr>
        <tr>
          <td>April</td>
          <td>150000</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
